name: Java CI with Maven

# 1. Kích hoạt khi có sự kiện push hoặc pull_request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 2. Lấy mã nguồn từ kho lưu trữ về máy ảo GitHub
      - uses: actions/checkout@v3

      # 3. Thiết lập môi trường Java 11 (khớp với bài 1 & 2)
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # 4. Thực thi vòng đời Maven: Clean, Test và Đóng gói (Package)
      - name: Build with Maven
        run: mvn -B clean package

      # 5. Triển khai action upload-artifact để lưu giữ tệp .jar
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: bank-system-jar
          path: target/*.jar
